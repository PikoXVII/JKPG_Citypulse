<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Venues – CityPulse</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="nav is-solid">
    <a class="brand" href="/">citypulse.</a>

    <nav class="menu" aria-label="Huvudmeny">
      <a href="/">Upptäck</a>
      <a href="/events.html">Evenemang</a>
      <a href="/districts.html">Stadsdelar</a>
      <a href="/info.html">Information</a>
      <a href="/admin.html">Admin</a>
    </nav>

    <button class="hamburger" data-hamburger aria-label="Öppna meny">☰</button>
  </header>

  <div class="mobilePanel" data-mobile-panel>
    <a href="/">Upptäck</a>
    <a href="/events.html">Evenemang</a>
    <a href="/districts.html">Stadsdelar</a>
    <a href="/info.html">Information</a>
    <a href="/admin.html">Admin</a>
  </div>

  <div class="spacer"></div>

  <main>
    <div class="container">
      <h1 class="h1">Venues</h1>
      <p class="p">Alla venues från databasen. Sök, filtrera på kategori och stadsdel, och sortera listan.</p>

      <form class="filters" data-filters>
        <input name="q" placeholder="Sök namn, adress, kategori eller stadsdel…" autocomplete="off" />
        <select name="category">
          <option value="">Alla kategorier</option>
        </select>
        <select name="district">
          <option value="">Alla stadsdelar</option>
        </select>
        <select name="sort">
          <option value="">Standard</option>
          <option value="name">Namn A–Ö</option>
          <option value="newest">Nyast</option>
          <option value="oldest">Äldst</option>
          <option value="category">Kategori</option>
          <option value="district">Stadsdel</option>
        </select>
        <button class="btn alt" type="button" data-reset-filters>Rensa filter</button>
      </form>

      <p class="small" data-results-info style="margin-top:14px"></p>
      <div class="panel" data-venues></div>
    </div>
  </main>

  <footer class="footer">
    <div class="footerBottom">
      <div>© <span data-year></span> CityPulse</div>
      <div><a href="/">Till startsidan</a></div>
    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/pages/venues.js"></script>
</body>
</html>
