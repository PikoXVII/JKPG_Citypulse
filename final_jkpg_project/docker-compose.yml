services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: citypulse
      POSTGRES_USER: citypulse
      POSTGRES_PASSWORD: citypulse
    volumes:
      - citypulse_db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citypulse -d citypulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    environment:
      PORT: 3000
      DATABASE_URL: postgres://citypulse:citypulse@db:5432/citypulse
      JWT_SECRET: change-me
      ADMIN_EMAIL: admin@citypulse.local
      ADMIN_PASSWORD: admin123
    ports:
      - "3000:3000"

volumes:
  citypulse_db: